seed: 42
agent:
  name: "dqn"
  hyperparams:
    learning_rate: 0.001
    gamma: 0.99
    epsilon: 0.1
    epsilon_decay: 0.995
    batch_size: 128
    buffer_size: 50000
    target_update_freq: 100
    hidden_dims: [256, 256] # Red oculta de 256x256 para comparabilidad con SAC

dataset:
  path: "../../data/obd/random/all.parquet"
  format: "parquet"
  schema_version: "bandit_v1"
  propensity_policy: "mark_unreliable"

training:
  max_steps: 2000
  eval_interval: 500
  checkpoint_interval: 1000

ope:
  estimators: ["ips", "dr", "mips"]
  reports_dir: "../../artifacts/models/benchmark_dqn_random"

paths:
  artifact_dir: "../../artifacts/models/benchmark_dqn_random"
