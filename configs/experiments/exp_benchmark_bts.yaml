seed: 42
agent:
  name: "sac"
  hyperparams:
    learning_rate: 0.001
    gamma: 0.99
    alpha: 0.5
    tau: 0.005
    batch_size: 128
    buffer_size: 50000

dataset:
  path: "../../data/obd/bts/all.parquet"
  format: "parquet"
  schema_version: "bandit_v1"
  propensity_policy: "mark_unreliable"

training:
  max_steps: 2000
  eval_interval: 500
  checkpoint_interval: 1000

ope:
  estimators: ["ips", "dr", "mips"]
  reports_dir: "../../artifacts/models/benchmark_bts"

paths:
  artifact_dir: "../../artifacts/models/benchmark_bts"
