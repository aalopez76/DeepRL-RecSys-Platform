# Experiment 2: PPO on Synthetic Dataset
# Inherits from default.yaml and overrides agent + dataset sections

seed: 123

agent:
  name: "ppo"
  hyperparams:
    learning_rate: 0.0003
    gamma: 0.99
    gae_lambda: 0.95
    clip_ratio: 0.2
    epochs_per_update: 10
    batch_size: 64
    hidden_dims: [128, 64]

dataset:
  path: "data/synthetic/"
  format: "parquet"
  schema_version: "bandit_v1"
  propensity_policy: "mark_unreliable"

training:
  max_steps: 2000
  eval_interval: 200
