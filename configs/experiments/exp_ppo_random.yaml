seed: 42
agent:
  name: "ppo"
  hyperparams:
    learning_rate: 0.0003
    gamma: 0.99
    clip_epsilon: 0.2
    value_coef: 0.5
    entropy_coef: 0.01 # Entropía inicial razonable para exploración
    ppo_epochs: 10
    batch_size: 128
    hidden_dims: [256, 256] # Red oculta de 256x256 para comparabilidad con SAC

dataset:
  path: "../../data/obd/random/all.parquet"
  format: "parquet"
  schema_version: "bandit_v1"
  propensity_policy: "mark_unreliable"

training:
  max_steps: 2000
  eval_interval: 500
  checkpoint_interval: 1000

ope:
  estimators: ["ips", "dr", "mips"]
  reports_dir: "../../artifacts/models/benchmark_ppo_random"

paths:
  artifact_dir: "../../artifacts/models/benchmark_ppo_random"
