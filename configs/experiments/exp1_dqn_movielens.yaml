# Experiment 1: DQN on MovieLens
# Inherits from default.yaml and overrides agent + dataset sections

seed: 42

agent:
  name: "dqn"
  hyperparams:
    learning_rate: 0.001
    gamma: 0.99
    epsilon_start: 1.0
    epsilon_end: 0.01
    epsilon_decay: 0.995
    batch_size: 64
    buffer_size: 10000
    target_update_freq: 100
    hidden_dims: [128, 64]

dataset:
  path: "data/movielens/"
  format: "csv"
  schema_version: "sequential_v1"
  propensity_policy: "mark_unreliable"

training:
  max_steps: 5000
  eval_interval: 500
  checkpoint_interval: 1000
